name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    needs: race
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Lint and tests typically finish in 5–7 minutes; ~2x headroom bounds hangs.
    steps:
      - name: Require race detector success
        env:
          RACE_RESULT: ${{ needs.race.result }}
        run: |
          if [ "$RACE_RESULT" != success ]; then
            echo "The required race job did not succeed: $RACE_RESULT" >&2
            exit 1
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "gofmt needs to be run on:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12

      - name: go test
        run: go test ./...

  secretscan:
    name: secretscan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: install Gitleaks
        timeout-minutes: 5
        run: |
          GOBIN="$RUNNER_TEMP/bin" go install github.com/zricethezav/gitleaks/v8@v8.30.1
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: scan full Git history
        timeout-minutes: 6
        run: timeout 5m gitleaks git . --log-opts=--all --no-banner --config .gitleaks.toml --redact --exit-code 1

      - name: scan working tree
        timeout-minutes: 6
        run: timeout 5m gitleaks dir . --no-banner --config .gitleaks.toml --redact --exit-code 1

      - name: verify synthetic secret detection
        timeout-minutes: 2
        run: bash scripts/gitleaks-selftest.sh

  race:
    name: race
    runs-on: ubuntu-latest
    timeout-minutes: 10 # The race test command has a two-minute test timeout; headroom covers setup and compilation.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: go test (race detector)
        run: go test -race -timeout=2m ./...

  e2e:
    name: e2e
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20 # Registry and provider lifecycle typically finish under 10 minutes; ~2x headroom bounds hangs.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: e2e (fake provider lifecycle + real registry install + protocol-5 failure)
        run: go test -tags e2e ./e2e -v

  goreleaser:
    name: goreleaser
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Snapshot cross-builds typically finish under 15 minutes; ~2x headroom bounds stalls.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: goreleaser check
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: check

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: goreleaser snapshot build
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          # Snapshot mode still runs signing in GoReleaser v2.17; CI has no OIDC.
          args: release --snapshot --clean --skip=sign

      - name: Verify snapshot SBOMs
        run: |
          sbom="$(find dist -maxdepth 1 -type f -name '*.sbom.json' -print -quit)"
          test -n "$sbom"
          ls dist/*.sbom.json
