name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing board-approved v* tag to build
        required: true
        type: string
      mode:
        description: Dry-run without a GitHub Release, or stage and publish after attestation
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish

permissions:
  contents: read

# Never let retries for the same tag replace or publish each other's draft.
concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  dry-run:
    name: dry-run
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run'
    environment: release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Validate release tag and dispatch ref
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          test "$GITHUB_REF" = refs/heads/main || {
            echo "Manual releases must be dispatched from main, not $GITHUB_REF" >&2
            exit 1
          }
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "Release tag must start with v: $RELEASE_TAG" >&2; exit 1 ;;
          esac
          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG" || {
            echo "Release tag does not exist: $RELEASE_TAG" >&2
            exit 1
          }
          test "$(git rev-parse HEAD)" = "$(git rev-list -n 1 "$RELEASE_TAG")"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Cosign v3 requires bundles; v2.6.4 supports the required .sig/.pem pair.
          cosign-release: 'v2.6.4'

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Build signed dry-run artifacts
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify signed release outputs
        run: |
          test -n "$(find dist -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          test -n "$(find dist -maxdepth 1 -type f -name '*.zip' -print -quit)"
          test -n "$(find dist -maxdepth 1 -type f -name '*.sbom.json' -print -quit)"
          test -s dist/checksums.txt
          test -s dist/checksums.txt.sig
          test -s dist/checksums.txt.pem

      - name: Attest dry-run archives and checksums
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

      - name: Collect provenance bundle
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: cp "$BUNDLE_PATH" dist/provenance.intoto.jsonl

      - name: Upload reviewable dry-run artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-dry-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sbom.json
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
            dist/provenance.intoto.jsonl
          if-no-files-found: error
          retention-days: 30

  publish:
    name: publish
    if: github.event_name == 'push' || inputs.mode == 'publish'
    environment: release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Validate release tag and dispatch ref
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = workflow_dispatch ] && [ "$GITHUB_REF" != refs/heads/main ]; then
            echo "Manual releases must be dispatched from main, not $GITHUB_REF" >&2
            exit 1
          fi
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "Release tag must start with v: $RELEASE_TAG" >&2; exit 1 ;;
          esac
          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG" || {
            echo "Release tag does not exist: $RELEASE_TAG" >&2
            exit 1
          }
          test "$(git rev-parse HEAD)" = "$(git rev-list -n 1 "$RELEASE_TAG")"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Cosign v3 requires bundles; v2.6.4 supports the required .sig/.pem pair.
          cosign-release: 'v2.6.4'

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Stage signed draft release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify signed release outputs
        run: |
          test -n "$(find dist -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          test -n "$(find dist -maxdepth 1 -type f -name '*.zip' -print -quit)"
          test -n "$(find dist -maxdepth 1 -type f -name '*.sbom.json' -print -quit)"
          test -s dist/checksums.txt
          test -s dist/checksums.txt.sig
          test -s dist/checksums.txt.pem

      - name: Attest release archives and checksums
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

      - name: Publish attested draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: gh release edit "$RELEASE_TAG" --repo tchori-labs/tchori --draft=false
