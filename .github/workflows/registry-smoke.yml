name: Registry smoke

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  registry-smoke:
    name: live registry smoke
    runs-on: ubuntu-latest
    # Live registry and provider downloads are bounded against upstream stalls.
    timeout-minutes: 20
    steps:
      # Coordination: immutable pins match the versions tracked by TC-001.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: live registry install and protocol negotiation smoke
        run: go test -tags smoke ./e2e -v
